# 로컬 개발용 인프라 (MySQL + Redis)
# 실행: docker compose up -d / 중지: docker compose down
# 주의: 아래 비밀번호는 로컬 개발 전용. 배포 환경에서는 환경변수로 주입 (작업 규칙 5)
services:
  mysql:
    image: mysql:8.0
    container_name: tollm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: tollmdev
      MYSQL_DATABASE: tollm          # 첫 기동 시 스키마 자동 생성
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - tollm-mysql-data:/var/lib/mysql   # 컨테이너를 지워도 데이터 유지

  redis:
    image: redis:7
    container_name: tollm-redis
    ports:
      - "6379:6379"

volumes:
  tollm-mysql-data:
